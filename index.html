<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); text-align: center; width: 90%; max-width: 450px; border-top: 8px solid #007bff; }
        h1 { color: #1a1a1a; margin-bottom: 10px; font-size: 28px; }
        p { color: #4b4b4b; line-height: 1.6; font-size: 16px; }
        .details { margin: 20px 0; text-align: left; background: #f8f9fa; padding: 15px; border-radius: 10px; }
        .tag { display: inline-block; background: #007bff; color: white; padding: 6px 15px; border-radius: 50px; font-size: 12px; font-weight: bold; text-transform: uppercase; margin-top: 15px; }
        .db-status { color: #28a745; font-weight: bold; font-size: 14px; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Yash Portfolio</h1>
        <p>College Semester Project</p>
        
        <div class="details">
            <p><strong>Name:</strong> Yash [Your Last Name]</p>
            <p><strong>Roll No:</strong> [Your Roll Number]</p>
            <p><strong>Tech Stack:</strong> HTML, CSS, Node.js, Express, TiDB Cloud</p>
        </div>

        <div class="tag">Live on Render</div>
        <div class="db-status">● Connected to TiDB MySQL</div>
    </div>
</body>
</html>
