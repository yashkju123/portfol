<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f4f9; color: #333; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .card { background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; max-width: 400px; border-top: 5px solid #007bff; }
        h1 { margin-bottom: 0.5rem; color: #222; }
        p { color: #666; line-height: 1.6; }
        .tag { display: inline-block; background: #e7f3ff; color: #007bff; padding: 5px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Hi, I'm [Your Name]</h1>
        <p>College Student | Full-Stack Developer Explorer</p>
        <div class="tag">Semester Project</div>
        <p>This website is powered by Node.js, Express, and TiDB Cloud.</p>
    </div>
</body>
</html>
