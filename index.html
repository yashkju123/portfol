<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yash | Full-Stack Portfolio</title>
    <style>
        :root { --primary: #00d4ff; --bg: #0d1117; --card: #161b22; --text: #c9d1d9; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: auto; }
        header { text-align: center; padding: 50px 0; border-bottom: 1px solid #30363d; }
        h1 { color: white; font-size: 2.5rem; margin: 0; }
        .counter-badge { background: #238636; color: white; padding: 5px 15px; border-radius: 20px; font-weight: bold; }
        section { margin-top: 40px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .card { background: var(--card); border: 1px solid #30363d; padding: 20px; border-radius: 10px; }
        form { background: var(--card); padding: 20px; border-radius: 10px; border: 1px solid #30363d; }
        input, textarea { width: 100%; padding: 10px; margin: 10px 0; background: #0d1117; border: 1px solid #30363d; color: white; box-sizing: border-box; }
        button { background: var(--primary); border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Yash</h1>
            <p>Full-Stack Engineer | <span class="counter-badge">Profile Views: {{VIEWS}}</span></p>
        </header>

        <section>
            <h2>DB Proof #1: Dynamic Projects</h2>
            <div class="grid">{{PROJECTS}}</div>
        </section>

        <section>
            <h2>DB Proof #2: Send a Message (Writes to TiDB)</h2>
            <form action="/contact" method="POST">
                <input type="text" name="name" placeholder="Your Name" required>
                <input type="email" name="email" placeholder="Your Email" required>
                <textarea name="msg" placeholder="Your Message" rows="4" required></textarea>
                <button type="submit">Send to Database</button>
            </form>
        </section>

        <footer style="text-align:center; padding: 40px; color: #8b949e;">
            Built with TiDB Cloud, Node.js & Render.
        </footer>
    </div>
</body>
</html>
